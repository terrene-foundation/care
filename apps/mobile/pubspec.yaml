# PACT Mobile Dashboard
# Governance dashboard for trust chains, agents, envelopes, and approvals.

name: pact_mobile
description: >
  PACT mobile and desktop dashboard. Provides governance oversight
  for EATP trust chains, constraint envelopes, agent management, and
  approval workflows across phone, tablet, and desktop form factors.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP & networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
