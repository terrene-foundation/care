services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        # Empty string — frontend uses relative URLs, proxied by Next.js rewrites
        NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    environment:
      # Server-side (Next.js rewrites) uses internal Docker DNS
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

  # Optional: local LLM for self-hosted mode
  # Uncomment to use Ollama instead of cloud API
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

